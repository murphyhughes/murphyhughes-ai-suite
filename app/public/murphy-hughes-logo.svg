<svg viewBox="0 0 1600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: 'Arial', 'Helvetica', sans-serif; }
      .company-name { font-size: 140px; font-weight: 900; fill: white; letter-spacing: -2px; }
      .tagline { font-size: 48px; font-weight: 400; fill: #cbd5e1; letter-spacing: 1px; }
    </style>
  </defs>
  
  <!-- Circular badge with MHMH -->
  <g id="circular-mark">
    <!-- Outer circle -->
    <circle cx="120" cy="150" r="105" fill="none" stroke="white" stroke-width="8"/>
    
    <!-- Inner circle -->
    <circle cx="120" cy="150" r="75" fill="none" stroke="white" stroke-width="2"/>
    
    <!-- MHMH text arranged radially -->
    <!-- Top M -->
    <text x="120" y="55" class="logo-text" font-size="32" font-weight="bold" fill="white" text-anchor="middle">M</text>
    
    <!-- Right H -->
    <text x="195" y="158" class="logo-text" font-size="32" font-weight="bold" fill="white" text-anchor="middle">H</text>
    
    <!-- Bottom M -->
    <text x="120" y="252" class="logo-text" font-size="32" font-weight="bold" fill="white" text-anchor="middle">M</text>
    
    <!-- Left H -->
    <text x="45" y="158" class="logo-text" font-size="32" font-weight="bold" fill="white" text-anchor="middle">H</text>
  </g>
  
  <!-- Main company name -->
  <text x="320" y="195" class="company-name">MURPHYHUGHES</text>
  
  <!-- Tagline -->
  <text x="320" y="265" class="tagline">BUSINESS INSIGHT &amp; STRATEGY</text>
</svg>
